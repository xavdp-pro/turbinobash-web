# Nginx reverse proxy for Proxmox VE (8006) and Proxmox Backup Server (8007).
# TLS: defaults to snakeoil; replace ssl_certificate* with Let's Encrypt after:
#   certbot certonly --nginx -d pve.bs1.ooo.ovh -d pbs.bs1.ooo.ovh
# Comments in English.

server {
	listen 80;
	listen [::]:80;
	server_name pve.bs1.ooo.ovh pbs.bs1.ooo.ovh;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name pve.bs1.ooo.ovh;

	ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
	ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

	client_max_body_size 0;

	location / {
		proxy_pass https://127.0.0.1:8006;
		proxy_http_version 1.1;
		proxy_ssl_server_name on;
		proxy_ssl_verify off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_buffer_size 128k;
		proxy_buffers 4 256k;
		proxy_busy_buffers_size 256k;
	}
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name pbs.bs1.ooo.ovh;

	ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
	ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

	client_max_body_size 0;

	location / {
		proxy_pass https://127.0.0.1:8007;
		proxy_http_version 1.1;
		proxy_ssl_server_name on;
		proxy_ssl_verify off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_buffer_size 128k;
		proxy_buffers 4 256k;
		proxy_busy_buffers_size 256k;
	}
}
